<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FPS Target Shooter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Game Container -->
    <div id="gameContainer">
        <!-- UI Overlay -->
        <div id="ui">
            <div id="score">Score: <span id="scoreValue">0</span></div>
            <div id="timer">Time: <span id="timerValue">30</span>s</div>
        </div>

        <!-- Game Over Screen -->
        <div id="gameOver" class="hidden">
            <h1>Game Over!</h1>
            <p>Skor Akhir: <span id="finalScore">0</span></p>
            <button id="restartBtn">Main Lagi</button>
        </div>

        <!-- Instructions -->
        <div id="instructions">
            <h2>FPS Target Shooter</h2>
            <p>Klik layar untuk mulai • Gerakkan mouse untuk mengarahkan • Klik kiri untuk tembak</p>
            <div class="crosshair-demo">⊕</div>
        </div>

        <!-- Canvas -->
        <canvas id="gameCanvas"></canvas>
    </div>

    <!-- Audio (opsional - uncomment jika ingin suara) -->
    <!--
    <audio id="shootSound" preload="auto">
        <source src="shoot.mp3" type="audio/mpeg">
    </audio>
    -->

    <script src="script.js"></script>
</body>
</html>
